services:
  api:
    build: .
    image: sentiment-api:latest
    ports:
      - "8000:8000"
    volumes:
      # Model artifacts live on the host; container gets read-only access.
      # Run 'make train' on the host to regenerate after retraining.
      - ./model/artifacts:/app/model/artifacts:ro
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ARTIFACTS_DIR: /app/model/artifacts/final
      RATE_LIMIT: "60/minute"
      # API_KEYS: "key-abc123,key-def456"  # comma-separated; empty = auth disabled
      OTEL_SERVICE_NAME: sentiment-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      REDIS_URL: redis://redis:6379/0
      MODEL_VERSIONS_DIR: /app/model/artifacts
      DEFAULT_MODEL_VERSION: final
      CACHE_TTL: "3600"
      DATABASE_URL: postgresql://sentiment:sentiment@postgres:5432/sentiment
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - monitoring

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - monitoring

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentiment
      POSTGRES_USER: sentiment
      POSTGRES_PASSWORD: sentiment
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - monitoring

  celery-worker:
    build: .
    image: sentiment-api:latest
    profiles: [workers]
    command: celery -A api.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./model/artifacts:/app/model/artifacts:ro
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ARTIFACTS_DIR: /app/model/artifacts/final
      REDIS_URL: redis://redis:6379/0
      MODEL_VERSIONS_DIR: /app/model/artifacts
      DEFAULT_MODEL_VERSION: final
      PYTHONPATH: /app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:2.6.1
    profiles: [monitoring]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  postgres_data:
