name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      # Install CPU-only PyTorch first to avoid pulling the large CUDA build.
      # The subsequent pip install -r requirements.txt satisfies the torch
      # constraint from cache without re-downloading.
      - name: Install CPU-only PyTorch
        run: pip install "torch>=2.2.0" --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache HuggingFace dataset downloads so the pipeline tests are fast
      # after the first run.
      - name: Cache HuggingFace assets
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('data/pipeline.py') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sentiment-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
